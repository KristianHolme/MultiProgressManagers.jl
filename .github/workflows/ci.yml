name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            version: "1.12"
            allow_failure: false
          - os: ubuntu-latest
            version: "1"
            allow_failure: false
          - os: macos-latest
            version: "1"
            allow_failure: false
          - os: windows-latest
            version: "1"
            allow_failure: false
          - os: ubuntu-latest
            version: "nightly"
            allow_failure: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate dependencies
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.add(url = "https://github.com/kahliburke/Tachikoma.jl"); Pkg.instantiate()'

      - name: Run tests
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; coverage=true)'

      - name: Process coverage
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
